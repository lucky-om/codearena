name: Deploy to GitHub Pages

# ═══════════════════════════════════════════════════════════
# Code Arena — GitHub Pages Deployment Workflow
# Developed by: Lucky
# Project: Code Arena — Wildcard Draw System (Inferno'26)
# Live at: https://codearena.luckyverse.tech
# ═══════════════════════════════════════════════════════════
#
# SETUP REQUIRED (one-time):
#   Go to your GitHub repo → Settings → Secrets and variables → Actions
#   Add these two repository secrets:
#     • VITE_ADMIN_KEY    → your real admin password
#     • VITE_SHEET_API_URL → your Google Apps Script URL
# ═══════════════════════════════════════════════════════════

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm 📦
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store ⚡
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies 📥
        run: pnpm install --frozen-lockfile

      - name: Build Website 🏗️
        run: pnpm run build
        env:
          # CI=false prevents build failures from linting warnings
          CI: false
          # These are read from GitHub Actions secrets — set them in:
          # Settings → Secrets and variables → Actions → New repository secret
          VITE_SHEET_API_URL: ${{ secrets.VITE_SHEET_API_URL }}
          VITE_ADMIN_KEY: ${{ secrets.VITE_ADMIN_KEY }}

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
